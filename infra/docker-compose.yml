services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3006:3006"
    depends_on:
      - postgres
      - redis

  worker:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm install && node apps/worker/index.js"]
    volumes:
      - ../:/app
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_site_al_ru
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  pg_data:
